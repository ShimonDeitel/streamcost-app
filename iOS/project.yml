name: Streamcost
options:
  bundleIdPrefix: com.shimondeitel.streamcost
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Streamcost:
    type: application
    platform: iOS
    sources:
      - path: Streamcost
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.streamcost
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Streamcost/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  StreamcostTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: StreamcostTests
      - path: Streamcost.storekit
    dependencies:
      - target: Streamcost
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.streamcost.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  StreamcostUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: StreamcostUITests
    dependencies:
      - target: Streamcost
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.streamcost.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Streamcost:
    build:
      targets:
        Streamcost: all
        StreamcostTests: [test]
        StreamcostUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Streamcost.storekit
    test:
      config: Debug
      storeKitConfiguration: Streamcost.storekit
      targets:
        - StreamcostTests
        - StreamcostUITests
    archive:
      config: Release
